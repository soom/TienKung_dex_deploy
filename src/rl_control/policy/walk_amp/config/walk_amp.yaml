  action_scale: 0.25               # 动作缩放比例，可写标量或 23 维数组
  decimation: 1                   # 策略下发频率控制

normalization:
  clip_scales:
    clip_observations: 100. #18.0mlp
    clip_actions: 100. #18.0
  obs_scales:
    lin_vel: 1.0                  # 线速度缩放因子
    ang_vel: 1.0                  # 角速度缩放因子
    dof_pos: 1.0                  # 关节位置缩放因子
    dof_vel: 1.0                  # 关节速度缩放因子

size:
  num_hist: 10                     # 历史观测帧数
  observations_size: 84          # 单帧观测长度

